<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Drone arms -->
  <line x1="32" y1="32" x2="14" y2="14" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="50" y2="14" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="14" y2="50" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="50" y2="50" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Propeller circles -->
  <circle cx="14" cy="14" r="7" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="50" cy="14" r="7" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="14" cy="50" r="7" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="50" cy="50" r="7" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.18)"/>
  <!-- Propeller blades (horizontal lines) -->
  <line x1="9" y1="14" x2="19" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="14" x2="55" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="50" x2="19" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="50" x2="55" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Drone body center -->
  <rect x="25" y="25" width="14" height="14" rx="3" fill="white"/>
  <!-- Camera lens -->
  <circle cx="32" cy="32" r="3.5" fill="#2563EB"/>
  <circle cx="32" cy="32" r="1.5" fill="white"/>
</svg>
